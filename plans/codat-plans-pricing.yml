specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Codat
providerId: codat
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Unified API
  - Accounting
  - Banking
  - SMB Financial Data
notes: Codat does not publish public pricing. Their commercial model is contact-sales-only, with pricing
  typically scoped to the number of Active Connected Companies (ACCs) and the product modules used (Bank
  Feeds, Bill Pay, Expenses, Lending, Spend Insights, Sync). Rate limits below are derived from the Codat
  rate-limits doc and scale with ACC count rather than a posted plan tier.
description: Codat is a unified API platform for SMB financial data (accounting, banking, ERP, payments,
  commerce). Codat does not publish a public price list; commercial terms are negotiated per customer based
  on the number of Active Connected Companies and the product modules consumed.
sources:
  - https://www.codat.io/
  - https://docs.codat.io/using-the-api/rate-limits
plans:
  - id: codat-platform
    name: Codat Platform
    type: enterprise
    description: Custom-priced commercial plan covering Codat's unified API products. Pricing scales with
      Active Connected Companies (ACCs) and the product modules in use.
    entries:
      - label: Active Connected Companies
        name: active_connected_companies
        type: subscription
        metric: account
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
      - label: API Calls
        name: api_calls
        type: quota
        metric: requests
        limit: -1
        timeFrame: day
        geo: global
        unit: 1
        price: included (subject to rate limits — see rate-limits doc)
        userMultiplied: false
    elements:
      - name: Accounting integrations (Xero, QuickBooks, Sage, NetSuite, etc.)
      - name: Banking & payment integrations
      - name: Commerce integrations
      - name: Bank Feeds
      - name: Bill Pay
      - name: Expenses
      - name: Lending
      - name: Spend Insights
      - name: Sandbox + production environments
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
