specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Codat
providerId: codat
publisherName: Codat
serviceCategory: Unified API
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - FinOps
  - FOCUS
  - Unified API
  - Accounting
  - Banking
  - Cost Management
notes: Codat does not publish public pricing; the FOCUS-aligned shape below assumes an Active-Connected-Company-priced
  subscription with optional product modules, which is consistent with how Codat positions commercial discussions.
  Validate exact billing line-items against your signed order form.
description: 'FOCUS-aligned FinOps for Codat: ACC-priced enterprise subscription with daily API call quotas
  derived from the ACC count. Codat does not publish a public price list, so principles below focus on
  ACC lifecycle hygiene and module-level allocation.'
sources:
  - https://www.codat.io/
  - https://docs.codat.io/using-the-api/rate-limits
billingModel:
  pricingCategory: Subscription
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
    - Tax
    - Adjustment
focusColumns:
  ServiceName: Codat
  ServiceCategory: Unified API
  ProviderName: Codat
  PublisherName: Codat
  InvoiceIssuerName: Codat
  PricingCategory: Subscription
  PricingUnit: connected-company-month
  BillingCurrency: USD
  ChargeCategory: Purchase
meters:
  - name: active_connected_companies
    description: Count of Active Connected Companies (ACCs) over the billing period.
    unit: account-month
    aggregation: max
    dimensions:
      - product_module
      - integration
      - environment
  - name: api_calls
    description: API calls made against the Codat platform; counts against the daily ACC-derived quota.
    unit: request
    aggregation: sum
    dimensions:
      - product_module
      - integration
      - company
  - name: integration_connections
    description: Active integration connections to upstream platforms (accounting, banking, commerce).
    unit: connection
    aggregation: max
    dimensions:
      - integration
      - environment
  - name: webhook_events
    description: Webhook events delivered (data sync notifications, rate-limit signals, etc.).
    unit: event
    aggregation: sum
    dimensions:
      - event_type
principles:
  - name: Visibility
    description: Use the Codat dashboard to monitor ACC counts, daily quota burn-down (X-Rate-Limit headers),
      and webhook delivery. Subscribe to `client.rateLimit.reached` to alert before quota exhaustion.
  - name: Allocation
    description: Tag ACCs and product modules to the consuming business line; reconcile module utilization
      against the order form quarterly.
  - name: Optimization
    description: Off-board inactive ACCs to free up daily quota (which scales linearly with ACC count);
      cache idempotent reads and rely on incremental sync rather than full refreshes; coalesce per-company
      polling to stay within the 10-concurrent-request-per-ACC ceiling.
  - name: Accountability
    description: Assign an integration owner per product module and review ACC growth against contract
      commitments before each renewal.
maintainers:
